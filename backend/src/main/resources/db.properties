# MySQL 数据库连接配置
# Docker 环境下 host 为 docker-compose 中的服务名 mysql
# 支持从环境变量读取配置，格式：${环境变量名:默认值}
jdbc.driver=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
jdbc.url=${DB_URL:jdbc:mysql://mysql:3306/exam_system?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
jdbc.username=${DB_USERNAME:root}
jdbc.password=${DB_PASSWORD:root123456}
